<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ english_title }} / {{ chinese_title }} · Project Memory Hub</title>
  </head>
  <body>
    <main id="content" class="page">

      <section class="panel" aria-labelledby="error-guidance-en">
        <h2 id="error-guidance-en" lang="en">Safe next step</h2>

        <h2 lang="zh-CN">安全的下一步</h2>
        <p lang="zh-CN">{{ chinese_message }}</p>
        <p><a href="/"><span lang="en">Return to Overview</span> / <span lang="zh-CN">返回概览</span></a></p>
      </section>
    </main>
  </body>
</html>
