name: Linux experimental compatibility

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  linux-experimental:
    name: Linux experimental (non-blocking)
    runs-on: ubuntu-24.04
    continue-on-error: true
    timeout-minutes: 45
    steps:
      - name: Check out the candidate
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Select Python 3.11
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.11"
      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: "0.11.28"
          enable-cache: false
      - name: Synchronize the locked test environment
        run: |
          uv lock --check
          uv sync --locked --extra test
      - name: Install Chromium and Linux system dependencies
        run: uv run playwright install --with-deps chromium
      - name: Run the experimental branch coverage gate
        run: uv run pytest --cov=project_memory_hub --cov-branch --cov-fail-under=85
      - name: Parse-check browser JavaScript
        run: |
          node --check src/project_memory_hub/web/static/i18n.js
          node --check src/project_memory_hub/web/static/projects.js
          node --check src/project_memory_hub/web/static/sources.js
      - name: Run experimental Chromium end-to-end tests
        run: uv run pytest tests/e2e -q
      - name: Verify synthetic demo privacy
        run: uv run python scripts/verify_public_assets.py docs/assets
