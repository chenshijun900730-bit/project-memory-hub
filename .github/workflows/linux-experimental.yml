name: Linux experimental compatibility

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  linux-python:
    name: Linux Python compatibility (experimental)
    runs-on: ubuntu-24.04
    continue-on-error: true
    timeout-minutes: 45
    steps:
      - name: Check out the candidate
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Select Python 3.11
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.11"
      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: "0.11.28"
          enable-cache: false
      - name: Synchronize the locked test environment
        run: |
          uv lock --check
          uv sync --locked --extra test
      - name: Run Linux-compatible Python tests
        run: uv run pytest --ignore=tests/e2e --basetemp=$HOME/pmh-linux-pytest -ra -q

  linux-javascript:
    name: Linux JavaScript syntax (experimental)
    runs-on: ubuntu-24.04
    continue-on-error: true
    timeout-minutes: 10
    steps:
      - name: Check out the candidate
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Parse-check browser JavaScript
        run: |
          node --check src/project_memory_hub/web/static/i18n.js
          node --check src/project_memory_hub/web/static/projects.js
          node --check src/project_memory_hub/web/static/sources.js

  linux-browser:
    name: Linux browser compatibility (experimental)
    runs-on: ubuntu-24.04
    continue-on-error: true
    timeout-minutes: 30
    steps:
      - name: Check out the candidate
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Select Python 3.11
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.11"
      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: "0.11.28"
          enable-cache: false
      - name: Synchronize the locked test environment
        run: |
          uv lock --check
          uv sync --locked --extra test
      - name: Install Chromium and Linux system dependencies
        run: uv run playwright install --with-deps chromium
      - name: Run Linux-compatible Chromium end-to-end tests
        run: uv run pytest tests/e2e --basetemp=$HOME/pmh-linux-e2e -ra -q

  linux-privacy:
    name: Linux public-asset privacy (experimental)
    runs-on: ubuntu-24.04
    continue-on-error: true
    timeout-minutes: 15
    steps:
      - name: Check out the candidate
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Select Python 3.11
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.11"
      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: "0.11.28"
          enable-cache: false
      - name: Synchronize the locked test environment
        run: |
          uv lock --check
          uv sync --locked --extra test
      - name: Verify synthetic demo privacy
        run: uv run python scripts/verify_public_assets.py docs/assets
